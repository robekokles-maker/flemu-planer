<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FM Planer Pro</title>
    
    <!-- PWA SETTINGS -->
    <meta name="apple-mobile-web-app-title" content="FM Planer">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#F39200">
    <link rel="manifest" href="manifest.json">

    <link rel="apple-touch-icon" href="icon.png">
    <link rel="icon" type="image/png" href="icon.png">

    <style>
        :root { 
            --gold-gradient: linear-gradient(90deg, #b36b00 0%, #f9d976 25%, #f39200 50%, #f9d976 75%, #b36b00 100%);
            --primary: #F39200; 
            --card: rgba(35, 35, 38, 0.95);
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #000; color: white; overflow-x: hidden; padding-top: env(safe-area-inset-top); }

        #pdfViewer, #helpOverlay, #customArea { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            z-index: 20000; display: none; align-items: center; 
            justify-content: center; padding: 20px; backdrop-filter: blur(15px); 
        }
        .pdf-container, .help-card, .overlay-content { 
            width: 95vw; max-width: 450px; background: #1a1a1a; 
            border: 2px solid var(--primary); border-radius: 20px; 
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 0 30px rgba(243, 146, 0, 0.4); padding: 20px;
        }
        #pdfFrameBox { flex:1; background:#1a1a1a; border-radius: 10px; overflow: hidden; }
        
        .scroll-area { overflow-y: auto; text-align: left; font-size: 13px; color: #ccc; line-height: 1.6; padding-right: 10px; max-height: 60vh; }
        .app { width: 100%; max-width: 500px; margin: 0 auto; background: rgba(15, 15, 17, 0.9); padding-bottom: 40px; }
        .metal-text { font-size: 28px; font-weight: 900; text-align: center; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; padding: 25px 0 10px; text-transform: uppercase; font-style: italic; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; padding: 12px; background: var(--card); margin: 0 15px 15px; border-radius: 18px; border: 1px solid #444; }
        .day-label { text-align: center; font-size: 10px; font-weight: bold; color: var(--primary); }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 15px; background: #2c2c2e; cursor: pointer; position: relative; }
        .day.selected-range { background: rgba(243, 146, 0, 0.5) !important; outline: 2px solid var(--primary); }
        .day.holiday { color: #ff453a !important; font-weight: 900; }
        .day.today { border: 2px solid #fff; }
        .day.has-event { font-size: 22px; }

        .action-btn { background: var(--gold-gradient); padding: 16px; border-radius: 12px; color: #000; text-align: center; font-weight: 900; text-transform: uppercase; border:none; cursor:pointer; width: 100%; margin-bottom: 10px; font-family: inherit; }
        .backup-btn { background: #1c1c1e; border: 2px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 12px; font-weight: 900; font-size: 11px; cursor: pointer; text-transform: uppercase; }
        .suggest-btn { background: #222; border: 1px solid #444; padding: 10px; border-radius: 10px; color: white; font-size: 11px; display: flex; flex-direction: column; align-items: center; cursor:pointer; }
        .danger-btn { background: #ff453a; color: #fff; padding: 14px; border-radius: 12px; width: 100%; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }

        .event-card { background: rgba(243,146,0,0.1); padding: 15px; border-radius: 12px; margin: 0 15px 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--primary); }
        .notes-area { margin: 0 15px 15px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px dashed #555; }
        textarea { width: 100%; background: transparent; border: none; color: white; font-size: 16px; outline: none; min-height: 80px; resize: none; }
    </style>
</head>
<body>

<div id="loader" style="position:fixed; inset:0; background:#000; z-index:30000; display:flex; justify-content:center; align-items:center;"><div class="metal-text">Flechtorfer Mühle</div></div>

<!-- ANLEITUNG -->
<div id="helpOverlay" onclick="this.style.display='none'">
    <div class="help-card" onclick="event.stopPropagation()">
        <h2 style="color:var(--primary); text-transform: uppercase; margin-bottom:15px;">Anleitung</h2>
        <div class="scroll-area">
            <p><strong>1. Markieren:</strong> Start- & Enddatum antippen.</p>
            <p><strong>2. Eintragen:</strong> Zeit & Icon wählen.</p>
            <p><strong>3. Eigener Text:</strong> Unter "Anderes" Text + Enter.</p>
            <p><strong>4. PDFs:</strong> Schichtplan/Liste öffnen. Auf JEDEM Gerät direkt laden/ansehen.</p>
        </div>
        <button class="action-btn" style="margin-top:20px;" onclick="document.getElementById('helpOverlay').style.display='none'">VERSTANDEN</button>
    </div>
</div>

<div id="customArea" onclick="if(event.target===this) toggleCustom()">
    <div class="overlay-content">
        <h3 style="color:var(--primary); margin:0; text-align:center;">WEITERE ICONS</h3>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0;">
            <button class="suggest-btn" onclick="quickAdd('✈️', 'Flug')" style="font-size:30px; padding:20px;"><span>✈️</span></button>
            <button class="suggest-btn" onclick="quickAdd('🌴', 'Urlaub')" style="font-size:30px; padding:20px;"><span>🌴</span></button>
            <button class="suggest-btn" onclick="quickAdd('🏥', 'Arzt')" style="font-size:30px; padding:20px;"><span>🏥</span></button>
            <button class="suggest-btn" onclick="quickAdd('🛠️', 'Rep.')" style="font-size:30px; padding:20px;"><span>🛠️</span></button>
            <button class="suggest-btn" onclick="quickAdd('🚒', 'Feuerwehr')" style="font-size:30px; padding:20px;"><span>🚒</span></button>
            <button class="suggest-btn" onclick="quickAdd('🍴', 'Essen')" style="font-size:30px; padding:20px;"><span>🍴</span></button>
        </div>
        <input type="text" id="customInput" placeholder="Eigener Text + Enter..." 
               style="width:100%; padding:15px; background:#000; color:white; border:1px solid var(--primary); border-radius:12px; margin-bottom:10px;"
               onkeydown="if(event.key==='Enter') quickAdd('📝', this.value)">
        <button class="action-btn" onclick="toggleCustom()" style="margin-top:10px;">SCHLIESSEN</button>
    </div>
</div>

<div id="pdfViewer" onclick="if(event.target === this) closePDF()">
    <div class="pdf-container" style="height:85vh;">
        <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333;">
            <span id="pdfTitle" style="color:var(--primary); font-weight:bold;">PDF</span>
            <button onclick="closePDF()" style="background:var(--primary); border:none; border-radius:5px; padding:5px 10px; font-weight:bold;">X</button>
        </div>
        <div id="pdfFrameBox"></div>
    </div>
</div>

<div class="app" id="mainApp">
    <div class="metal-text">Flechtorfer Mühle</div>
    
    <div style="display:flex; gap:10px; padding:0 15px 15px;">
        <div style="flex:1; background:rgba(243,146,0,0.1); padding:12px; border-radius:12px; text-align:center; color:var(--primary); font-weight:bold; cursor:pointer;" onclick="document.getElementById('helpOverlay').style.display='flex'">❓ Hilfe</div>
        <div style="flex:1; background:rgba(243,146,0,0.1); padding:12px; border-radius:12px; text-align:center; color:var(--primary); font-weight:bold; cursor:pointer;" onclick="shareApp()">🔗 Teilen</div>
    </div>

    <div style="padding:0 15px;">
        <button onclick="viewPDF('plan.pdf', 'SCHICHTPLAN')" class="action-btn">📅 Schichtplan</button>
        <button onclick="viewPDF('liste.pdf', 'LISTE')" class="action-btn">📋 Abwesenheit</button>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px;">
            <button onclick="exportData()" class="backup-btn">💾 SICHERN</button>
            <button onclick="document.getElementById('importFile').click()" class="backup-btn">📂 LADEN</button>
            <input type="file" id="importFile" style="display:none" onchange="importData(event)">
        </div>
    </div>

    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 25px;">
        <button onclick="changeMonth(-1)" style="background:none; border:none; color:var(--primary); font-size:22px;">❮</button>
        <h3 id="monthDisplay" style="color:var(--primary); margin:0;"></h3>
        <button onclick="changeMonth(1)" style="background:none; border:none; color:var(--primary); font-size:22px;">❯</button>
    </div>

    <div class="calendar-grid" id="calendar"></div>
    <div id="eventContainer"></div>
    <div id="notesContainer"></div>

    <div style="padding:20px; background:#0a0a0a; border-radius:25px 25px 0 0; border-top:1px solid #333;">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <input type="time" id="startTime" value="06:00" style="background:#1c1c1e; color:#f9d976; border:2px solid #555; padding:10px; border-radius:10px; font-size:20px;">
            <span style="color:var(--primary); font-size:24px;">➔</span>
            <input type="time" id="endTime" value="14:00" style="background:#1c1c1e; color:#f9d976; border:2px solid #555; padding:10px; border-radius:10px; font-size:20px;">
        </div>
        <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; margin-bottom:20px;">
            <button class="suggest-btn" onclick="quickAdd('💼', 'Meeting')"><span>💼</span>Meeting</button>
            <button class="suggest-btn" onclick="quickAdd('⚽', 'Fußball')"><span>⚽</span>Fußball</button>
            <button class="suggest-btn" onclick="quickAdd('🏊', 'Schwimmen')"><span>🏊</span>Schwimmen</button>
            <button class="suggest-btn" onclick="quickAdd('🧘', 'Relax')"><span>🧘</span>Relax</button>
            <button class="suggest-btn" onclick="quickAdd('🥳', 'Party')"><span>🥳</span>Party</button>
            <button class="suggest-btn" onclick="toggleCustom()" style="border:1px solid var(--primary)"><span>⚙️</span>Anderes</button>
        </div>
        <button onclick="clearYearlyEvents()" class="danger-btn">🗑️ JAHR <span id="delYear"></span> LÖSCHEN</button>
    </div>
</div>

<script>
    const PASS = "Müller 2026";
    if (localStorage.getItem('fm_access') !== 'true') {
        if (prompt("Passwort:") === PASS) localStorage.setItem('fm_access', 'true');
        else location.reload();
    }
    
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(e => console.log(e));
    }

    setTimeout(() => document.getElementById('loader').style.display='none', 800);

    let currentDate = new Date(), realToday = new Date();
    let events = JSON.parse(localStorage.getItem('fm_pro_v5')) || {};
    let rangeStart = null, rangeEnd = null;

    function getEaster(y) {
        const f=Math.floor, G=y%19, C=f(y/100), H=(C-f(C/4)-f((8*C+13)/25)+19*G+15)%30, I=H-f(H/28)*(1-f(29/(H+1))*f((21-G)/11)), J=(y+f(y/4)+I+2-C+f(C/4))%7, L=I-J, m=3+f((L+40)/44), d=L+28-31*f(m/4);
        return new Date(y, m-1, d);
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        cal.innerHTML = '<div class="day-label">MO</div><div class="day-label">DI</div><div class="day-label">MI</div><div class="day-label">DO</div><div class="day-label">FR</div><div class="day-label">SA</div><div class="day-label">SO</div>';
        const y = currentDate.getFullYear(), m = currentDate.getMonth();
        document.getElementById('monthDisplay').innerText = new Intl.DateTimeFormat('de-DE', {month:'long', year:'numeric'}).format(currentDate);
        document.getElementById('delYear').innerText = y;
        const easter = getEaster(y);
        const holi = { [`1-0-${y}`]:1, [`1-4-${y}`]:1, [`3-9-${y}`]:1, [`31-9-${y}`]:1, [`25-11-${y}`]:1, [`26-11-${y}`]:1 };
        const addH = (d) => holi[`${d.getDate()}-${d.getMonth()}-${d.getFullYear()}`] = 1;
        addH(new Date(easter.getTime()-2*86400000)); addH(new Date(easter.getTime()+86400000));
        addH(new Date(easter.getTime()+39*86400000)); addH(new Date(easter.getTime()+50*86400000));
        let first = (new Date(y, m, 1).getDay()+6)%7;
        for (let i=0; i<first; i++) cal.appendChild(document.createElement('div'));
        for (let i=1; i<=new Date(y, m+1, 0).getDate(); i++) {
            const k=`${i}-${m}-${y}`, loop=new Date(y, m, i), d=document.createElement('div');
            d.className = 'day';
            if (holi[k]) d.classList.add('holiday');
            if (rangeStart && !rangeEnd && rangeStart.getTime()===loop.getTime()) d.classList.add('selected-range');
            if (rangeStart && rangeEnd) {
                let s = rangeStart<rangeEnd?rangeStart:rangeEnd, e=rangeStart<rangeEnd?rangeEnd:rangeStart;
                if (loop>=s && loop<=e) d.classList.add('selected-range');
            }
            if (i===realToday.getDate() && m===realToday.getMonth() && y===realToday.getFullYear()) d.classList.add('today');
            if (events[k]?.emoji) { d.classList.add('has-event'); d.innerHTML=`<span style="position:absolute; top:2px; left:4px; font-size:8px; color:var(--primary)">${i}</span>${events[k].emoji}`; }
            else { d.innerHTML=i; }
            d.onclick = () => {
                if (!rangeStart || (rangeStart && rangeEnd)) { rangeStart=new Date(loop); rangeEnd=null; }
                else { rangeEnd=new Date(loop); }
                renderCalendar(); renderUI();
            };
            cal.appendChild(d);
        }
    }

    function renderUI() {
        const evC=document.getElementById('eventContainer'), ntC=document.getElementById('notesContainer');
        evC.innerHTML=''; ntC.innerHTML=''; if(!rangeStart) return;
        let k=`${rangeStart.getDate()}-${rangeStart.getMonth()}-${rangeStart.getFullYear()}`;
        if (rangeStart && rangeEnd) {
            evC.innerHTML = `<button onclick="deleteRange()" style="background:rgba(255,69,58,0.2); border:1px solid #ff453a; color:#ff453a; margin:0 15px 15px; padding:12px; border-radius:12px; width:calc(100% - 30px); font-weight:800; cursor:pointer;">🗑️ ZEITRAUM LÖSCHEN</button>`;
        } else if(events[k]?.emoji) {
            evC.innerHTML=`<div class="event-card"><div>${events[k].emoji} <b>${events[k].title}</b><br><small>${events[k].start}-${events[k].end} Uhr</small></div><button onclick="delete events['${k}'].emoji; renderCalendar(); renderUI();" style="color:#ff453a; background:none; border:none; font-size:22px;">✕</button></div>`;
        }
        ntC.innerHTML=`<div class="notes-area"><textarea placeholder="Notizen..." oninput="events['${k}']=events['${k}']||{}; events['${k}'].note=this.value; localStorage.setItem('fm_pro_v5', JSON.stringify(events));">${events[k]?.note||""}</textarea></div>`;
    }

    function deleteRange() {
        let s = rangeStart < rangeEnd ? new Date(rangeStart) : new Date(rangeEnd);
        let e = rangeStart < rangeEnd ? new Date(rangeEnd) : new Date(rangeStart);
        while(s <= e) {
            let k = `${s.getDate()}-${s.getMonth()}-${s.getFullYear()}`;
            if(events[k]) { delete events[k].emoji; delete events[k].title; }
            s.setDate(s.getDate()+1);
        }
        localStorage.setItem('fm_pro_v5', JSON.stringify(events));
        rangeStart = rangeEnd = null; renderCalendar(); renderUI();
    }

    function quickAdd(emoji, title) {
        const finalEmoji = emoji || '📝'; 
        const finalTitle = title || document.getElementById('customInput').value;
        if(!rangeStart || !finalTitle) return;
        let s = rangeEnd ? (rangeStart < rangeEnd ? new Date(rangeStart) : new Date(rangeEnd)) : new Date(rangeStart);
        let e = rangeEnd ? (rangeStart < rangeEnd ? new Date(rangeEnd) : new Date(rangeStart)) : new Date(rangeStart);
        while(s <= e) {
            let k = `${s.getDate()}-${s.getMonth()}-${s.getFullYear()}`;
            events[k] = events[k] || {};
            Object.assign(events[k], { emoji: finalEmoji, title: finalTitle, start: document.getElementById('startTime').value, end: document.getElementById('endTime').value });
            s.setDate(s.getDate()+1);
        }
        localStorage.setItem('fm_pro_v5', JSON.stringify(events));
        document.getElementById('customInput').value = '';
        rangeStart = rangeEnd = null; toggleCustom(true); renderCalendar(); renderUI();
    }

    function exportData() {
        const blob = new Blob([JSON.stringify(events)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url; a.download = `FM_Backup_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function importData(e) {
        const file = e.target.files; if(!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                events = JSON.parse(ev.target.result);
                localStorage.setItem('fm_pro_v5', JSON.stringify(events));
                renderCalendar(); alert("Daten erfolgreich geladen!");
            } catch(err) { alert("Datei ungültig!"); }
        };
        reader.readAsText(file);
    }

    function toggleCustom(forceClose) { 
        const a = document.getElementById('customArea'); 
        a.style.display = (forceClose || a.style.display==='flex') ? 'none' : 'flex'; 
    }

    function viewPDF(u, t) {
        document.getElementById('pdfTitle').innerText = t;
        
        // Einheitlicher goldener Button für JEDES Gerät
        document.getElementById('pdfFrameBox').innerHTML = `
            <div style="height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#1a1a1a; padding:30px; text-align:center;">
                <div style="font-size:60px; margin-bottom:20px;">📄</div>
                <h2 style="color:white; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px;">${t}</h2>
                <p style="color:#888; margin-bottom:30px; font-size:14px; line-height:1.4;">
                    Klicke auf den Button, um das Dokument<br>im Vollbild anzuzeigen oder zu speichern.
                </p>
                <a href="${u}" target="_blank" class="action-btn" 
                   style="text-decoration:none; display:block; width:100%; padding:18px; font-size:16px; line-height:1.2;">
                   DATEI ÖFFNEN / LADEN
                </a>
                <p style="color:var(--primary); font-size:11px; margin-top:20px; opacity:0.8;">
                    Tipp: In der Vollansicht kannst du wischen und zoomen.
                </p>
            </div>`;
        
        document.getElementById('pdfViewer').style.display = 'flex';
    }

    function closePDF() { document.getElementById('pdfViewer').style.display = 'none'; }
    function changeMonth(d) { currentDate.setMonth(currentDate.getMonth()+d); renderCalendar(); }
    function clearYearlyEvents() { if(confirm("Gesamtes Jahr leeren?")) { Object.keys(events).forEach(k => { if(k.endsWith("-"+currentDate.getFullYear())) delete events[k]; }); localStorage.setItem('fm_pro_v5', JSON.stringify(events)); renderCalendar(); renderUI(); }}

    async function shareApp() {
        const y=currentDate.getFullYear(), m=currentDate.getMonth(), mN=new Intl.DateTimeFormat('de-DE',{month:'long'}).format(currentDate);
        let txt=`📅 *Plan: ${mN} ${y}*\n`, i=1, has=false;
        while(i<=new Date(y,m+1,0).getDate()) {
            const k=`${i}-${m}-${y}`;
            if(events[k]?.emoji) {
                has=true; let start=i, curr=events[k];
                while(i < new Date(y,m+1,0).getDate() && events[`${i+1}-${m}-${y}`]?.emoji === curr.emoji) i++;
                let range = (start===i)?`${String(start).padStart(2,'0')}.${String(m+1).padStart(2,'0')}.` : `${String(start).padStart(2,'0')}.${String(m+1).padStart(2,'0')}. - ${String(i).padStart(2,'0')}.${String(m+1).padStart(2,'0')}.`;
                txt+=`\n• ${range} ${curr.emoji} *${curr.title}*`;
            }
            i++;
        }
        if(!has) return alert("Leer!");
        try { if(navigator.share) await navigator.share({text:txt}); else { await navigator.clipboard.writeText(txt); alert("Kopiert!"); }} catch(e){}
    }

    renderCalendar();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>FM Planer Pro</title>
    
    <!-- PWA & App-Icon Einstellungen -->
    <meta name="apple-mobile-web-app-title" content="FM Planer">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { 
            --gold-gradient: linear-gradient(90deg, #b36b00 0%, #f9d976 25%, #f39200 50%, #f9d976 75%, #b36b00 100%);
            --primary: #F39200; 
            --card: rgba(35, 35, 38, 0.95);
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }

        /* PDF MODAL */
        #pdfViewer { position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(10px); }
        .pdf-container { width: 90vw; height: 160vw; max-height: 82vh; max-width: 420px; background: #fff; border: 2px solid var(--primary); border-radius: 15px; display: flex; flex-direction: column; overflow: hidden; }
        .pdf-header { background: #1a1a1a; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; }
        .pdf-frame-container { flex: 1; width: 100%; height: 100%; overflow: auto; background: #eee; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-pdf { background: var(--gold-gradient); border: none; padding: 6px 15px; border-radius: 6px; font-weight: 900; color: #000; }

        /* HILFE OVERLAY */
        #helpOverlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 25px; backdrop-filter: blur(10px); }
        .help-card { background: #1a1a1a; padding: 20px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; }

        /* APP DESIGN */
        .app-container { height: 100vh; overflow-y: auto; }
        .app { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; background: rgba(15, 15, 17, 0.9); visibility: hidden; padding-bottom: 40px; }
        .app.unlocked { visibility: visible; }
        .metal-text { font-size: 28px; font-weight: 900; text-align: center; background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; padding: 25px 0 10px; text-transform: uppercase; font-style: italic; }

        .widget-row { display: flex; gap: 10px; padding: 0 15px 15px; }
        .info-btn-widget { flex: 1; background: rgba(243, 146, 0, 0.1); border: 1px solid rgba(243, 146, 0, 0.3); border-radius: 12px; padding: 12px; display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--primary); font-weight: bold; cursor: pointer; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; padding: 12px; background: var(--card); margin: 0 15px 15px; border-radius: 18px; border: 1px solid #444; }
        .day-label { text-align: center; font-size: 10px; font-weight: bold; color: var(--primary); }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 15px; background: #2c2c2e; cursor: pointer; position: relative; }
        .day.weekend { background: #1c1c1e; color: #666; }
        .day.today { border: 2px solid var(--primary); }
        .day.selected-range { background: rgba(243, 146, 0, 0.4) !important; outline: 1px solid var(--primary); }
        .day.holiday { color: #ff453a !important; font-weight: 900; }
        .day.has-event { font-size: 22px; flex-direction: column; text-shadow: 0 0 5px rgba(0,0,0,0.5); }
        .day-num { position: absolute; top: 3px; left: 4px; font-size: 8px; font-weight: bold; color: var(--primary); }
        .day.has-note::after { content: ''; position: absolute; bottom: 4px; width: 4px; height: 4px; background: var(--primary); border-radius: 50%; }

        .action-btn { background: var(--gold-gradient); margin: 0 15px 15px; padding: 16px; border-radius: 12px; color: #000; text-align: center; font-weight: 900; text-transform: uppercase; border:none; cursor:pointer; width: calc(100% - 30px); }
        .input-area { padding: 20px; background: #0a0a0a; border-radius: 25px 25px 0 0; border-top: 1px solid #333; }
        .time-box { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 20px; }
        .time-box input { padding: 12px 5px; border-radius: 10px; border: 2px solid #555; background: #1c1c1e; color: #f9d976; width: 45%; text-align: center; font-size: 24px; font-weight: 900; font-family: monospace; }
        .suggestion-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .suggest-btn { background: #222; border: 1px solid #444; padding: 10px; border-radius: 10px; color: white; font-size: 11px; display: flex; flex-direction: column; align-items: center; }
        .suggest-btn span { font-size: 20px; margin-bottom: 4px; }

        .notes-area { margin: 0 15px 15px; padding: 15px; background: rgba(243, 146, 0, 0.05); border-radius: 12px; border: 1px dashed var(--primary); }
        .notes-area textarea { width: 100%; background: transparent; border: none; color: white; font-size: 14px; outline: none; min-height: 60px; resize: none; }
        .event-card { background: #1c1c1e; margin: 0 15px 15px; padding: 12px; border-radius: 12px; border-left: 4px solid var(--primary); display: flex; justify-content: space-between; align-items: center; }

        #loader { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 30000; transition: 0.6s; }
        .loader-ring { width: 35px; height: 35px; border: 3px solid rgba(243, 146, 0, 0.1); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader"><div class="metal-text">Flechtorfer Mühle</div><div class="loader-ring"></div></div>

<!-- HILFE OVERLAY -->
<div id="helpOverlay" onclick="toggleHelp(false)">
    <div class="help-card" onclick="event.stopPropagation()">
        <h2 style="color:var(--primary)">Kurzanleitung</h2>
        <ul style="text-align:left; font-size:13px; color:#ccc">
            <li>Tag wählen oder Zeitraum (Start + Ende) anklicken.</li>
            <li>Symbol oder "Anderes" wählen zum Eintragen.</li>
            <li>Notizen werden automatisch pro Tag gespeichert.</li>
            <li>Teilen sendet den Monatsplan ohne Notizen.</li>
        </ul>
        <button class="action-btn" onclick="toggleHelp(false)">Verstanden!</button>
    </div>
</div>

<!-- PDF VIEWER -->
<div id="pdfViewer" onclick="if(event.target === this) closePDF()">
    <div class="pdf-container">
        <div class="pdf-header">
            <span id="pdfTitle" style="font-weight:900; color:var(--primary); font-size:12px;">DOKUMENT</span>
            <button class="close-pdf" onclick="closePDF()">X</button>
        </div>
        <div class="pdf-frame-container"><iframe id="pdfFrame" src=""></iframe></div>
    </div>
</div>

<div class="app-container" id="scrollBox">
    <div class="app" id="mainApp">
        <div class="metal-text">Flechtorfer Mühle</div>
        
        <div class="widget-row">
            <div class="info-btn-widget" onclick="toggleHelp(true)"><span>❓</span> Hilfe</div>
            <div class="info-btn-widget" onclick="shareApp()"><span>🔗</span> Teilen</div>
        </div>

        <button onclick="viewPDF('plan.pdf', 'SCHICHTPLAN')" class="action-btn">📅 Schichtplan einsehen</button>

        <div style="display:flex; justify-content:space-between; align-items:center; padding:5px 25px;">
            <button onclick="changeMonth(-1)" style="background:none; border:none; color:var(--primary); font-size:22px;">❮</button>
            <h3 id="monthDisplay" style="color:var(--primary); margin:0; font-size: 16px;"></h3>
            <button onclick="changeMonth(1)" style="background:none; border:none; color:var(--primary); font-size:22px;">❯</button>
        </div>

        <div class="calendar-grid" id="calendar"></div>
        <div id="eventContainer"></div>
        <div id="notesContainer"></div>

        <div class="input-area">
            <div class="time-box">
                <input type="time" id="startTime" value="06:00">
                <span style="color:var(--primary); font-weight:900;">➔</span>
                <input type="time" id="endTime" value="14:00">
            </div>
            <div class="suggestion-grid">
                <button class="suggest-btn" onclick="quickAdd('💼', 'Meeting')"><span>💼</span>Meeting</button>
                <button class="suggest-btn" onclick="quickAdd('⚽', 'Fußball')"><span>⚽</span>Fußball</button>
                <button class="suggest-btn" onclick="quickAdd('🏊', 'Schwimmen')"><span>🏊</span>Schwimmen</button>
                <button class="suggest-btn" onclick="quickAdd('🥳', 'Party')"><span>🥳</span>Party</button>
                <button class="suggest-btn" onclick="toggleCustom()"><span>⚙️</span>Anderes</button>
                <button class="suggest-btn" onclick="viewPDF('liste.pdf', 'ABWESENHEITSLISTE')"><span>📋</span>Liste</button>
            </div>

            <!-- Alles Löschen Button -->
            <button onclick="clearYearlyEvents()" style="grid-column: span 3; background: rgba(255, 69, 58, 0.05); border: 1px dashed #ff453a; color: #ff453a; margin-top: 15px; padding: 10px; border-radius: 10px; font-weight: 800; font-size: 10px; width: 100%; cursor: pointer; text-transform: uppercase;">
                🗑️ Jahresplan <span id="delYear">2026</span> zurücksetzen
            </button>

            <!-- Andere Symbole Area -->
            <div id="customArea" style="display:none; margin-top:15px; padding:10px; background:rgba(253, 217, 118, 0.05); border-radius:12px; border:1px solid var(--primary);">
                <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px; margin-bottom:10px;">
                    <button class="suggest-btn" onclick="quickAdd('✈️', 'Flugzeug')"><span>✈️</span></button>
                    <button class="suggest-btn" onclick="quickAdd('🚒', 'Feuerwehr')"><span>🚒</span></button>
                    <button class="suggest-btn" onclick="quickAdd('🌴', 'Urlaub')"><span>🌴</span></button>
                    <button class="suggest-btn" onclick="quickAdd('🏥', 'Arzt/Krank')"><span>🏥</span></button>
                    <button class="suggest-btn" onclick="quickAdd('🛠️', 'Reparatur')"><span>🛠️</span></button>
                </div>
                <input type="text" id="customInput" placeholder="Eigener Text + Enter..." style="width:100%; padding:10px; border-radius:8px; border:1px solid #444; background:#000; color:white; font-size:13px; outline:none;">
            </div>
        </div>
    </div>
</div>

<script>
    const PASSWORT = "Müller 2026";
    if (localStorage.getItem('fm_access') !== 'true') {
        let input = prompt("Bitte Passwort eingeben:");
        if (input === PASSWORT) localStorage.setItem('fm_access', 'true');
        else { alert("Falsch!"); location.reload(); }
    }
    document.getElementById('mainApp').classList.add('unlocked');

    let currentDate = new Date();
    const realToday = new Date();
    let events = JSON.parse(localStorage.getItem('fm_pro_v5')) || {};
    let rangeStart = null, rangeEnd = null;

    function toggleHelp(s) { document.getElementById('helpOverlay').style.display = s ? 'flex' : 'none'; }
    function viewPDF(u, t) { document.getElementById('pdfTitle').innerText = t; document.getElementById('pdfFrame').src = u; document.getElementById('pdfViewer').style.display = 'flex'; }
    function closePDF() { document.getElementById('pdfViewer').style.display = 'none'; document.getElementById('pdfFrame').src = ""; }

    function getEaster(year) {
        const f = Math.floor, G = year % 19, C = f(year / 100), H = (C - f(C/4) - f((8*C+13)/25) + 19*G + 15) % 30,
              I = H - f(H/28)*(1-f(29/(H+1))*f((21-G)/11)), J = (year + f(year/4) + I + 2 - C + f(C/4)) % 7,
              L = I - J, m = 3 + f((L+40)/44), d = L + 28 - 31*f(m/4);
        return new Date(year, m - 1, d);
    }

    function renderCalendar() {
        const cal = document.getElementById('calendar');
        cal.innerHTML = '<div class="day-label">MO</div><div class="day-label">DI</div><div class="day-label">MI</div><div class="day-label">DO</div><div class="day-label">FR</div><div class="day-label">SA</div><div class="day-label">SO</div>';
        const y = currentDate.getFullYear(), m = currentDate.getMonth();
        document.getElementById('monthDisplay').innerText = new Intl.DateTimeFormat('de-DE', { month: 'long', year: 'numeric' }).format(currentDate);
        document.getElementById('delYear').innerText = y;

        const easter = getEaster(y);
        const holi = { [`1-0-${y}`]:1, [`1-4-${y}`]:1, [`3-9-${y}`]:1, [`31-9-${y}`]:1, [`25-11-${y}`]:1, [`26-11-${y}`]:1 };
        const addH = (d) => { holi[`${d.getDate()}-${d.getMonth()}-${d.getFullYear()}`] = 1; };
        addH(new Date(easter.getTime() - 2*86400000)); addH(new Date(easter.getTime() + 86400000));
        addH(new Date(easter.getTime() + 39*86400000)); addH(new Date(easter.getTime() + 50*86400000));

        let firstDay = (new Date(y, m, 1).getDay() + 6) % 7;
        for (let i = 0; i < firstDay; i++) cal.appendChild(document.createElement('div'));
        for (let i = 1; i <= new Date(y, m + 1, 0).getDate(); i++) {
            const key = `${i}-${m}-${y}`, loopDate = new Date(y, m, i), d = document.createElement('div');
            d.className = 'day' + ((loopDate.getDay() % 6 === 0) ? ' weekend' : '');
            if (holi[key]) d.classList.add('holiday');
            if (rangeStart && !rangeEnd && rangeStart.getTime() === loopDate.getTime()) d.classList.add('selected-range');
            if (rangeStart && rangeEnd) {
                let s = rangeStart < rangeEnd ? rangeStart : rangeEnd, e = rangeStart < rangeEnd ? rangeEnd : rangeStart;
                if (loopDate >= s && loopDate <= e) d.classList.add('selected-range');
            }
            if (i === realToday.getDate() && m === realToday.getMonth() && y === realToday.getFullYear()) d.classList.add('today');
            if (events[key]?.emoji) { d.classList.add('has-event'); d.innerHTML = `<span class="day-num">${i}</span>${events[key].emoji}`; }
            else { d.innerHTML = i; if (events[key]?.note?.trim()) d.classList.add('has-note'); }
            d.onclick = () => selectDay(i, m, y);
            cal.appendChild(d);
        }
    }

    function selectDay(d, m, y) {
        const clicked = new Date(y, m, d);
        if (!rangeStart || (rangeStart && rangeEnd)) { rangeStart = clicked; rangeEnd = null; }
        else { rangeEnd = clicked; }
        renderCalendar(); renderUI();
    }

    function renderUI() {
        const evC = document.getElementById('eventContainer'), ntC = document.getElementById('notesContainer');
        evC.innerHTML = ''; ntC.innerHTML = '';
        if (!rangeStart) return;
        let k = `${rangeStart.getDate()}-${rangeStart.getMonth()}-${rangeStart.getFullYear()}`;
        if (events[k]?.emoji) {
            evC.innerHTML = `<div class="event-card"><div>${events[k].emoji} <b>${events[k].title}</b><br><small style="color:var(--primary)">${events[k].start} - ${events[k].end} Uhr</small></div><button onclick="deleteEvent('${k}')" style="border:none; background:none; font-size:22px; color:#ff453a;">✕</button></div>`;
        }
        ntC.innerHTML = `<div class="notes-area"><small style="color:var(--primary); font-weight:bold; display:block; margin-bottom:5px;">NOTIZEN</small><textarea id="dayNote" placeholder="Hier tippen..." oninput="saveNote()">${events[k]?.note || ""}</textarea></div>`;
    }

    function saveNote() {
        let k = `${rangeStart.getDate()}-${rangeStart.getMonth()}-${rangeStart.getFullYear()}`;
        if (!events[k]) events[k] = {};
        events[k].note = document.getElementById('dayNote').value;
        localStorage.setItem('fm_pro_v5', JSON.stringify(events));
        renderCalendar();
    }

    function quickAdd(emoji, title) {
        if (!rangeStart) return;
        const s = document.getElementById('startTime').value, e = document.getElementById('endTime').value;
        let startL = rangeEnd ? (rangeStart < rangeEnd ? rangeStart : rangeEnd) : rangeStart;
        let endL = rangeEnd ? (rangeStart < rangeEnd ? rangeEnd : rangeStart) : rangeStart;
        let t = new Date(startL);
        while (t <= endL) {
            let k = `${t.getDate()}-${t.getMonth()}-${t.getFullYear()}`;
            if (!events[k]) events[k] = {};
            Object.assign(events[k], { emoji, title, start: s, end: e });
            t.setDate(t.getDate() + 1);
        }
        localStorage.setItem('fm_pro_v5', JSON.stringify(events));
        rangeStart = rangeEnd = null; renderCalendar(); renderUI();
        document.getElementById('customArea').style.display = 'none';
    }

    function deleteEvent(k) {
        if (events[k]) { events[k].emoji = null; if (!events[k].note) delete events[k]; }
        localStorage.setItem('fm_pro_v5', JSON.stringify(events));
        renderCalendar(); renderUI();
    }

    function clearYearlyEvents() {
        const y = currentDate.getFullYear();
        if (confirm(`Alle Einträge für ${y} wirklich löschen?`)) {
            Object.keys(events).forEach(k => { if (k.endsWith(`-${y}`)) delete events[k]; });
            localStorage.setItem('fm_pro_v5', JSON.stringify(events));
            renderCalendar(); renderUI();
        }
    }

    async function shareApp() {
        const y = currentDate.getFullYear(), m = currentDate.getMonth(), mN = new Intl.DateTimeFormat('de-DE', { month: 'long' }).format(currentDate);
        let txt = `📅 *Mein Plan: ${mN} ${y}*\n`;
        let has = false;
        for (let i = 1; i <= new Date(y, m + 1, 0).getDate(); i++) {
            const k = `${i}-${m}-${y}`;
            if (events[k]?.emoji) {
                has = true;
                txt += `\n• ${String(i).padStart(2,'0')}.${String(m+1).padStart(2,'0')}. ${events[k].emoji} *${events[k].title}* (${events[k].start}-${events[k].end} Uhr)`;
            }
        }
        txt += `\n\n_Gesendet von meinem FM Planer_`;
        try {
            if (navigator.share) await navigator.share({ title: 'FM Planer', text: txt });
            else { await navigator.clipboard.writeText(txt); alert("Kopiert!"); }
        } catch (e) {}
    }

    function toggleCustom() {
        const a = document.getElementById('customArea'), i = document.getElementById('customInput');
        a.style.display = (a.style.display==='none'||a.style.display==='') ? 'block' : 'none';
        if(a.style.display==='block') {
            i.focus();
            i.onkeydown = (e) => { if(e.key==='Enter' && i.value.trim()!=="") quickAdd('📍', i.value); };
        }
    }

    function changeMonth(d) { currentDate.setMonth(currentDate.getMonth() + d); renderCalendar(); }

    window.onload = () => { renderCalendar(); setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => document.getElementById('loader').style.display='none', 600); }, 1200); };
</script>
</body>
</html>
